# CI/CD 自动化流程
# 代码提交后自动触发：数据格式校验、单元测试、集成测试、自动部署
name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # 阶段1：数据格式校验与字段类型转换
  # ============================================================
  data-validation:
    name: 数据格式校验与类型转换
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行数据格式校验与类型转换测试
        run: |
          python -m pytest tests/test_data_validation.py -v --tb=short --junitxml=reports/data-validation.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ============================================================
  # 阶段2：单元测试（小规模CSV验证SQL正确性）
  # ============================================================
  unit-tests:
    name: 单元测试（CSV验证SQL正确性）
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行单元测试（使用fixtures CSV验证SQL正确性）
        run: |
          python -m pytest tests/test_unit.py -v --tb=short --junitxml=reports/unit-tests.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ============================================================
  # 阶段3：集成测试（连接ClickHouse端到端验证）
  # ============================================================
  integration-tests:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'  # 仅push时运行集成测试
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行集成测试（连接ClickHouse验证全流程）
        run: |
          python -m pytest tests/test_integration.py -v --tb=long --junitxml=reports/integration-tests.xml
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}

  # ============================================================
  # 阶段4：自动部署至ClickHouse与可视化服务
  # ============================================================
  deploy:
    name: 部署至ClickHouse与可视化服务
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 创建/更新ClickHouse表结构
        run: |
          python -m src.main create-tables
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}

      - name: 导入数据（全量ETL流水线）
        run: |
          python -m src.main import
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}

      - name: 计算价格指数
        run: |
          python -m src.main compute
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}

      - name: 生成可视化图表
        run: |
          python -m src.main plot-total --no-show --save total_trend.png
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}

      - name: 导出数据报告
        run: |
          python -m src.main export --format csv --output reports/index_data.csv
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}

      - name: 验证部署结果
        run: |
          python -m src.main verify
        env:
          PYTHONPATH: ${{ github.workspace }}
          CK_HOST: ${{ secrets.CK_HOST }}
          CK_PORT: ${{ secrets.CK_PORT }}
          CK_USER: ${{ secrets.CK_USER }}
          CK_PASSWORD: ${{ secrets.CK_PASSWORD }}
          CK_DATABASE: ${{ secrets.CK_DATABASE }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifacts
          path: |
            reports/
            output/
          retention-days: 30
